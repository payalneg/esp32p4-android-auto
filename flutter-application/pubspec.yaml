name: aa_bridge
description: "Notification + media BLE bridge to ESP32-P4 head unit."
publish_to: 'none'
version: 0.2.0+13

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_blue_plus: ^1.32.12
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.2.3
  crypto: ^3.0.3
  protobuf: ^3.1.0
  rxdart: ^0.27.7
  package_info_plus: ^8.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    # P4 firmware image bundled for over-WiFi OTA flashing from the app.
    # Refresh with scripts/stage_firmware_asset.sh after idf.py build.
    - assets/firmware/esp32p4_android_auto.bin
    - assets/firmware/version.txt

# Run: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: "assets/icon_legacy.png"
  adaptive_icon_background: "#161B1E"
  adaptive_icon_foreground: "assets/icon_foreground.png"
